<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#00E5A0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EnglishNow</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="auth-bg"></div>

  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">🇺🇸</div>
      <div class="auth-logo-title">EnglishNow</div>
      <div class="auth-logo-subtitle">Aprenda inglês do dia a dia</div>
    </div>

    <!-- SETUP: primeiro cadastro do PIN -->
    <div id="setup-section" style="display:none; width:100%; flex-direction:column; align-items:center; gap:24px;">
      <div class="auth-title" id="setup-title">Crie seu PIN de acesso</div>
      <div class="pin-dots" id="setup-dots">
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
      </div>
      <p class="pin-confirm-hint" id="setup-hint">Digite um PIN de 4 dígitos</p>
      <div class="numpad" id="setup-numpad"></div>
      <div class="auth-message" id="setup-msg"></div>
    </div>

    <!-- LOGIN: PIN existente -->
    <div id="login-section" style="display:none; width:100%; flex-direction:column; align-items:center; gap:24px;">
      <div class="auth-title">Bem-vindo de volta!</div>
      <div class="pin-dots" id="login-dots">
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
      </div>
      <div class="numpad" id="login-numpad"></div>
      <button class="biometric-btn" id="bio-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
          <path d="M3 12c0-2 1-4 2.5-5.5M21 12c0-2-1-4-2.5-5.5"/>
          <path d="M7 19c0-2.8 2.2-5 5-5s5 2.2 5 5"/>
          <path d="M12 14v6"/>
        </svg>
        Entrar com biometria
      </button>
      <div class="auth-message" id="login-msg"></div>
    </div>
  </div>

  <!-- Lock overlay -->
  <div class="lock-overlay" id="lock-overlay" style="display:none">
    <div class="lock-icon">🔒</div>
    <div class="lock-text">Muitas tentativas incorretas</div>
    <div class="lock-countdown" id="lock-countdown">30</div>
    <div style="font-size:14px; color: var(--color-text-secondary);">Tente novamente em breve</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
